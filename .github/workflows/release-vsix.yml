name: Release VSIX

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.7"
        required: true
        type: string

permissions: {}

jobs:
  release-vsix:
    name: Build VSIX and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate release ref
        id: ref
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${REQUESTED_TAG}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release ref must be an explicit tag like v1.2.3. Got: ${tag}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.ref.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Extensions/vscode-ai-rules-manager/package-lock.json

      - name: Verify tag matches extension version
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"
          version="$(node -p "require('./Extensions/vscode-ai-rules-manager/package.json').version")"
          expected="v${version}"

          if [[ "${tag}" != "${expected}" ]]; then
            echo "::error::Release tag ${tag} must match VSIX version ${expected}."
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm ci

      - name: Audit dependencies
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm run audit

      - name: Compile extension
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm run compile

      - name: Verify compiled runtime
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm run verify:runtime

      - name: Package VSIX
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm run package

      - name: Verify VSIX runtime sentinels
        working-directory: Extensions/vscode-ai-rules-manager
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          vsix="ai-rules-manager-${VERSION}.vsix"

          if [[ ! -f "${vsix}" ]]; then
            echo "::error::VSIX not found: ${vsix}"
            exit 1
          fi

          python3 - "${vsix}" <<'PY'
          import sys
          import zipfile

          vsix = sys.argv[1]
          try:
              with zipfile.ZipFile(vsix) as archive:
                  runtime = archive.read("extension/out/scriptRunner.js").decode("utf-8")
          except KeyError:
              print("::error::Missing VSIX runtime file: extension/out/scriptRunner.js")
              sys.exit(1)

          def fail(message):
              print(f"::error::{message}")
              sys.exit(1)

          def need(needle, label):
              if needle not in runtime:
                  fail(f"Missing VSIX runtime sentinel: {label}")

          def order(first, second, label):
              first_index = runtime.find(first)
              second_index = runtime.find(second)
              if first_index < 0 or second_index < 0 or first_index >= second_index:
                  fail(f"VSIX runtime sentinel order failed: {label}")

          sentinels = [
              ("vscode.workspace.isTrusted", "workspace trust"),
              ("assertGitRepoIdentity", "repo identity guard"),
              ("assertManagedPath", "managed path guard"),
              ("assertTrackedCleanManagerScript", "tracked clean manager script"),
              ("ls-files", "tracked manager script check"),
              ("status", "clean manager script check"),
              ("+refs/heads/", "explicit fetch refspec source"),
              (":refs/remotes/origin/", "explicit fetch refspec destination"),
              ("assertReadyToRun(source, script, target)", "readiness gate"),
              ("cp.spawn(ps, args", "manager spawn"),
          ]
          for needle, label in sentinels:
              need(needle, label)

          order("assertReadyToRun(source, script, target)", "cp.spawn(ps, args", "readiness before spawn")
          order("assertGitRepoIdentity(managedRoot, repoUrl)", "--hard", "identity before destructive reset")
          order("assertManagedPath(storageRoot, managedRoot);", "--hard", "managed path before destructive reset")
          print("VSIX runtime sentinel verification passed.")
          PY

      - name: Build release notes
        id: notes
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"

          changelog_section="$(
            awk -v version="${VERSION}" '
              /^## / {
                if (capture) { exit }
                if ($0 ~ "AI Rules Manager v" version) {
                  capture = 1
                  next
                }
              }
              capture { print }
            ' CHANGELOG.md
          )"

          previous_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"

          {
            echo "## AI Rules Manager v${VERSION}"
            echo
            echo "這版更新 AI Rules Manager 的安裝包與治理同步行為。"
            echo

            if [[ -n "${changelog_section//[[:space:]]/}" ]]; then
              echo "${changelog_section}"
              echo
            else
              echo "### 更新內容"
              echo "- 更新 AI Rules Manager 安裝包。"
              echo
            fi

            echo "### 安裝檔"
            echo "下載下方 Assets 中的 \`ai-rules-manager-${VERSION}.vsix\`。"

            if [[ -n "${previous_tag}" ]]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG_NAME}"
            fi
          } > "${notes_file}"

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.notes.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail
          vsix="Extensions/vscode-ai-rules-manager/ai-rules-manager-${VERSION}.vsix"
          asset_name="$(basename "${vsix}")"

          if [[ ! -f "${vsix}" ]]; then
            echo "::error::VSIX not found: ${vsix}"
            exit 1
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            existing_asset="$(
              gh release view "${TAG_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq ".assets[] | select(.name == \"${asset_name}\") | .name"
            )"

            if [[ "${existing_asset}" == "${asset_name}" ]]; then
              echo "::error::Release asset already exists: ${asset_name}. Refusing to overwrite."
              exit 1
            fi

            gh release edit "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AI Rules Manager ${TAG_NAME}" \
              --notes-file "${NOTES_FILE}"
            gh release upload "${TAG_NAME}" "${vsix}" --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG_NAME}" "${vsix}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AI Rules Manager ${TAG_NAME}" \
              --notes-file "${NOTES_FILE}"
          fi
