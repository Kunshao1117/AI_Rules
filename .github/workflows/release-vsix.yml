name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-vsix:
    name: Build VSIX and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Extensions/vscode-ai-rules-manager/package-lock.json

      - name: Verify tag matches extension version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="$(node -p "require('./Extensions/vscode-ai-rules-manager/package.json').version")"
          expected="v${version}"

          if [[ "${tag}" != "${expected}" ]]; then
            echo "::error::Release tag ${tag} must match VSIX version ${expected}."
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm ci

      - name: Package VSIX
        working-directory: Extensions/vscode-ai-rules-manager
        run: npm run package

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          vsix="Extensions/vscode-ai-rules-manager/ai-rules-manager-${VERSION}.vsix"

          if [[ ! -f "${vsix}" ]]; then
            echo "::error::VSIX not found: ${vsix}"
            exit 1
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${vsix}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG_NAME}" "${vsix}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AI Rules Manager ${TAG_NAME}" \
              --generate-notes
          fi
